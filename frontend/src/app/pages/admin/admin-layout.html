<div class="drawer lg:drawer-open min-h-screen">
  <input id="admin-drawer" type="checkbox" class="drawer-toggle" />

  <!-- Content -->
  <div class="drawer-content flex flex-col bg-base-200 min-h-screen">
    <!-- Mobile topbar -->
    <div class="lg:hidden flex items-center gap-2 p-3 border-b border-base-300 bg-base-100">
      <label for="admin-drawer" class="btn btn-square btn-ghost btn-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
      </label>
      <span class="font-serif text-lg font-medium">Panel</span>
    </div>

    <div class="p-5 md:p-8 lg:p-10 w-full max-w-6xl mx-auto">
      <router-outlet />
    </div>
  </div>

  <!-- Sidebar (espresso) -->
  <div class="drawer-side z-20" data-theme="laguna-dark">
    <label for="admin-drawer" class="drawer-overlay"></label>
    <aside class="bg-base-100 border-r border-base-300 min-h-full w-64 flex flex-col">
      <div class="px-6 py-7 border-b border-base-300">
        <p class="eyebrow">La Laguna</p>
        <h1 class="font-serif text-2xl font-semibold tracking-tight text-base-content mt-1">Panel<span class="text-primary">.</span></h1>
      </div>

      <nav class="flex-1 px-3 py-5 space-y-1">
        <a routerLink="/admin" routerLinkActive="!bg-base-300 !text-primary border-l-2 !border-primary" [routerLinkActiveOptions]="{ exact: true }"
           class="flex items-center gap-3 px-3 py-2.5 rounded-field text-base-content/70 hover:bg-base-300/60 hover:text-primary transition-colors text-sm font-medium tracking-wide">
          <span>◧</span> Dashboard
        </a>
        <a routerLink="/admin/reservas" routerLinkActive="!bg-base-300 !text-primary border-l-2 !border-primary"
           class="flex items-center gap-3 px-3 py-2.5 rounded-field text-base-content/70 hover:bg-base-300/60 hover:text-primary transition-colors text-sm font-medium tracking-wide">
          <span>☷</span> Reservas
        </a>
        <a routerLink="/admin/mesas" routerLinkActive="!bg-base-300 !text-primary border-l-2 !border-primary"
           class="flex items-center gap-3 px-3 py-2.5 rounded-field text-base-content/70 hover:bg-base-300/60 hover:text-primary transition-colors text-sm font-medium tracking-wide">
          <span>⊞</span> Mesas
        </a>
        <a routerLink="/admin/menu" routerLinkActive="!bg-base-300 !text-primary border-l-2 !border-primary"
           class="flex items-center gap-3 px-3 py-2.5 rounded-field text-base-content/70 hover:bg-base-300/60 hover:text-primary transition-colors text-sm font-medium tracking-wide">
          <span>❧</span> Carta
        </a>

        @if (auth.isAdmin()) {
          <div class="px-3 pt-4 pb-1"><span class="eyebrow !text-base-content/40">Administración</span></div>
          <a routerLink="/admin/usuarios" routerLinkActive="!bg-base-300 !text-primary border-l-2 !border-primary"
             class="flex items-center gap-3 px-3 py-2.5 rounded-field text-base-content/70 hover:bg-base-300/60 hover:text-primary transition-colors text-sm font-medium tracking-wide">
            <span>☖</span> Usuarios
          </a>
          <a routerLink="/admin/ajustes" routerLinkActive="!bg-base-300 !text-primary border-l-2 !border-primary"
             class="flex items-center gap-3 px-3 py-2.5 rounded-field text-base-content/70 hover:bg-base-300/60 hover:text-primary transition-colors text-sm font-medium tracking-wide">
            <span>⚙</span> Ajustes
          </a>
        }
      </nav>

      <div class="px-3 py-4 border-t border-base-300 space-y-1">
        <a routerLink="/" class="flex items-center gap-3 px-3 py-2 rounded-field text-base-content/60 hover:text-primary transition-colors text-sm tracking-wide">← Volver a la web</a>
        <button (click)="logout()" class="flex w-full items-center gap-3 px-3 py-2 rounded-field text-base-content/60 hover:text-error transition-colors text-sm tracking-wide">Cerrar sesión</button>
      </div>
    </aside>
  </div>
</div>
